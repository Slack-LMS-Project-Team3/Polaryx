name: CI-CD

permissions:
  contents: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - "main"

env:
  AWS_REGION: "ap-northeast-2"
  BE_ECR_REPOSITORY: "slam-server"
  FE_ECR_REPOSITORY: "slam-server-front"
  NEXT_PUBLIC_BASE: "https://polaryx.net"
  NEXT_PUBLIC_WS: "wss://polaryx.net"
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: "BNreSJUzEIIAWG-qnlzRvYepD_svGLY6PJtNO4F6O8Vu9Ev_bMZK5albJ2OJCBOkn2-9bJcTIpx_4Z02YSEarwU"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'FE/**'
              - 'docker-compose.frontend.yml'
            backend:
              - 'BE/**'
              - 'docker-compose.backend.yml'

  setup:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

  build-frontend:
    needs: [changes, setup]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./FE
          push: true
          tags: |
            ${{ needs.setup.outputs.registry }}/${{ env.FE_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ needs.setup.outputs.registry }}/${{ env.FE_ECR_REPOSITORY }}:latest
          build-args: |
            NEXT_PUBLIC_BASE=${{ env.NEXT_PUBLIC_BASE }}
            NEXT_PUBLIC_WS=${{ env.NEXT_PUBLIC_WS }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ env.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-backend:
    needs: [changes, setup]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./BE
          push: true
          tags: |
            ${{ needs.setup.outputs.registry }}/${{ env.BE_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ needs.setup.outputs.registry }}/${{ env.BE_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-frontend:
    needs: [changes, setup, build-frontend]
    if: needs.changes.outputs.frontend == 'true' && (success() || failure())
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy frontend docker-compose to Frontend Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.T3_EC2_SSH_KEY }}
          source: docker-compose.frontend.yml
          target: /home/ec2-user

      - name: Deploy to Frontend Server
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.T3_EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ needs.setup.outputs.registry }}
            cd /home/ec2-user
            docker compose -f docker-compose.frontend.yml pull
            docker compose -f docker-compose.frontend.yml down
            docker compose -f docker-compose.frontend.yml up -d
            docker image prune -a -f

  deploy-backend:
    needs: [changes, setup, build-backend]
    if: needs.changes.outputs.backend == 'true' && (success() || failure())
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if docker-compose file changed
        id: check-changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...${{ github.head_ref }} | grep -q "docker-compose.backend.yml"; then
            echo "file_changed=true" >> $GITHUB_OUTPUT
          else
            echo "file_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload docker-compose to S3 (if changed)
        if: steps.check-changes.outputs.file_changed == 'true'
        run: |
          aws s3 rm s3://file-import-s3-bucket/docker-compose.backend.yml --quiet || true
          aws s3 cp docker-compose.backend.yml s3://file-import-s3-bucket/docker-compose.backend.yml

      - name: Deploy to Backend Servers
        uses: peterkimzz/aws-ssm-send-command@v1
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: |
            ${{ secrets.EC2_BACKEND_1_ID }}
            ${{ secrets.EC2_BACKEND_2_ID }}
          working-directory: /home/ec2-user
          command: |
            if [ "${{ steps.check-changes.outputs.file_changed }}" == "true" ]; then
              aws s3 cp s3://file-import-s3-bucket/docker-compose.backend.yml /home/ec2-user/docker-compose.backend.yml
            fi
            sudo chown ec2-user:ec2-user /home/ec2-user/docker-compose.backend.yml
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ needs.setup.outputs.registry }}
            docker compose -f /home/ec2-user/docker-compose.backend.yml pull
            docker compose -f /home/ec2-user/docker-compose.backend.yml down
            docker compose -f /home/ec2-user/docker-compose.backend.yml up -d
            docker image prune -a -f