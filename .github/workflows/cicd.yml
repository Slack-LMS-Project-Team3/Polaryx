name: CI-CD

permissions:
  contents: read

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - "main"

env:
  AWS_REGION: "ap-northeast-2"
  BE_ECR_REPOSITORY: "slam-server"
  FE_ECR_REPOSITORY: "slam-server-front"
  NEXT_PUBLIC_BASE: "https://polaryx.net"
  NEXT_PUBLIC_WS: "wss://polaryx.net"
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: "BNreSJUzEIIAWG-qnlzRvYepD_svGLY6PJtNO4F6O8Vu9Ev_bMZK5albJ2OJCBOkn2-9bJcTIpx_4Z02YSEarwU"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'FE/**'
              - 'docker-compose.frontend.yml'
            backend:
              - 'BE/**'
              - 'docker-compose.backend.yml'

      - name: Set up Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FE/package-lock.json

      - name: Set up Python
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Python dependencies
        if: steps.changes.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('BE/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

  build-frontend:
    needs: build
    if: needs.build.outputs.frontend-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./FE
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FE_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FE_ECR_REPOSITORY }}:latest
          build-args: |
            NEXT_PUBLIC_BASE=${{ env.NEXT_PUBLIC_BASE }}
            NEXT_PUBLIC_WS=${{ env.NEXT_PUBLIC_WS }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ env.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-backend:
    needs: build
    if: needs.build.outputs.backend-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./BE
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BE_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BE_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: [build, build-frontend, build-backend]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy frontend docker-compose to Frontend Server
        if: needs.build.outputs.frontend-changed == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.T3_EC2_SSH_KEY }}
          source: |
            docker-compose.frontend.yml
          target: /home/ec2-user
      
      # Backend 인스턴스는 private subnet에 위치하기 때문에 파일 복사가 안됨 (인터넷 통신이 안되기에).
      # 그래서 docker.backend.yml 파일 생성 or S3에 올린 뒤 다운로드 받는 방식으로 진행해야 됨.
      # 근데 파일 생성하는건 한번 해봤으니까, S3에 올리고, 다운받는 방식으로 설계해봄.
      # 사실 docker-compose.backend.yml 파일은 ci/cd 매번 돌릴때마다 S3에 업로드하고, 다운로드 받는건 불필요함.
      # 그래서 이 파일이 수정되었을때만 S3에 업로드하고, 다운로드 하도록 조건 달아줌.
      
      # 1. 파일 변경 감지
      - name: Check if docker-compose file changed
        id: check-changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...${{ github.head_ref }} | grep -q "docker-compose.backend.yml"; then
            echo "file_changed=true" >> $GITHUB_OUTPUT
          else
            echo "file_changed=false" >> $GITHUB_OUTPUT
          fi

      # 2. 조건부 S3 업로드
      - name: Upload docker-compose to S3 (if changed)
        if: steps.check-changes.outputs.file_changed == 'true'
        run: |
          aws s3 rm s3://file-import-s3-bucket/docker-compose.backend.yml
          echo "Old file removed from S3"
          aws s3 cp docker-compose.backend.yml s3://file-import-s3-bucket/docker-compose.backend.yml
          echo "File uploaded to S3"

      # 3. 조건부 S3 다운로드
      - name: Download docker-compose from S3 to Backend Server 1
        if: steps.check-changes.outputs.file_changed == 'true' && needs.build.outputs.backend-changed == 'true'
        uses: peterkimzz/aws-ssm-send-command@v1
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ secrets.EC2_BACKEND_1_ID }}
          working-directory: /home/ec2-user
          command: |
            rm -f /home/ec2-user/docker-compose.backend.yml
            echo "Old file removed from server"
            aws s3 cp s3://file-import-s3-bucket/docker-compose.backend.yml /home/ec2-user/docker-compose.backend.yml
            echo "File downloaded from S3"

      - name: Download docker-compose from S3 to Backend Server 2
        if: steps.check-changes.outputs.file_changed == 'true' && needs.build.outputs.backend-changed == 'true'
        uses: peterkimzz/aws-ssm-send-command@v1
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ secrets.EC2_BACKEND_2_ID }}
          working-directory: /home/ec2-user
          command: |
            rm -f /home/ec2-user/docker-compose.backend.yml
            echo "Old file removed from server"
            aws s3 cp s3://file-import-s3-bucket/docker-compose.backend.yml /home/ec2-user/docker-compose.backend.yml
            echo "File downloaded from S3"


      - name: Deploy to Backend Server 1 via SSM
        if: needs.build.outputs.backend-changed == 'true'
        uses: peterkimzz/aws-ssm-send-command@v1
        id: ssm1
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ secrets.EC2_BACKEND_1_ID }}
          working-directory: /home/ec2-user
          command: >-
            sudo chown ec2-user:ec2-user /home/ec2-user/docker-compose.backend.yml &&
            sudo -u ec2-user bash -c "
              aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} &&
              docker compose -f /home/ec2-user/docker-compose.backend.yml pull &&
              docker compose -f /home/ec2-user/docker-compose.backend.yml down &&
              docker compose -f /home/ec2-user/docker-compose.backend.yml up -d &&
              docker image prune -a -f
            "
            
      - name: Deploy to Backend Server 2 via SSM
        if: needs.build.outputs.backend-changed == 'true'
        uses: peterkimzz/aws-ssm-send-command@v1
        id: ssm2
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ secrets.EC2_BACKEND_2_ID }}
          working-directory: /home/ec2-user
          command: >-
            sudo chown ec2-user:ec2-user /home/ec2-user/docker-compose.backend.yml &&
            sudo -u ec2-user bash -c "
              aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} &&
              docker compose -f /home/ec2-user/docker-compose.backend.yml pull &&
              docker compose -f /home/ec2-user/docker-compose.backend.yml down &&
              docker compose -f /home/ec2-user/docker-compose.backend.yml up -d &&
              docker image prune -a -f
            "
          
      - name: Deploy to Frontend Server
        if: needs.build.outputs.frontend-changed == 'true'
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.T3_EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            cd /home/ec2-user

            docker compose -f docker-compose.frontend.yml pull
            docker compose -f docker-compose.frontend.yml down
            docker compose -f docker-compose.frontend.yml up -d
            docker image prune -a -f